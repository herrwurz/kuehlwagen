document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lay: swap;\n  src: url(\"34f71171-8380-41da-8a70-e2f9ea205e5c\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"a592179e-521f-4825-b502-c9ce2a7921b8\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"286cc2cd-077a-4e55-8b15-963a57d681bb\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Hanken Grotesk';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"d9460192-1b9e-4e0b-8d8d-90f56530fbf4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; background: #eef2f7; min-height: 100vh; font-family: 'Hanken Grotesk', sans-serif; }\n  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }\n  input, textarea { font-family: 'Hanken Grotesk', sans-serif; }\n  input:focus, textarea:focus { outline: none; border-color: #3b82d6 !important; }\n<\u002Fstyle>\n<script src=\"172dff20-a11a-4963-9108-f3da9d97391e\"><\u002Fscript>\n<\u002Fhelmet>\n\n<!-- HEADER -->\n<div style=\"background:#142029;padding:16px 24px;display:flex;align-items:center;gap:16px\">\n  <img src=\"c3c78599-058d-4f76-8281-867132a9f386\" style=\"height:36px;width:auto;display:block;flex-shrink:0\">\n  <div style=\"width:1px;height:32px;background:#2a3d4d;flex-shrink:0\"><\u002Fdiv>\n  <div>\n    <div style=\"font-size:18px;font-weight:800;color:#fff;letter-spacing:-.3px\">Kühlwagen-Verleih<\u002Fdiv>\n    <div style=\"font-size:12px;color:#7d8a97\">Unverbindliche Buchungsanfrage<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- SUCCESS -->\n<sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"max-width:560px;margin:60px auto;padding:0 20px;text-align:center;animation:fadeIn .4s\">\n  <div style=\"width:72px;height:72px;border-radius:50%;background:#e7f5ee;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:36px;color:#2f9e6a\">✓<\u002Fdiv>\n  <h2 style=\"font-size:24px;font-weight:800;color:#142029;margin:0 0 12px\">Anfrage gesendet!<\u002Fh2>\n  <p style=\"color:#5a6675;font-size:15px;line-height:1.7;margin:0 0 28px\">Wir haben Ihre Anfrage erhalten und melden uns schnellstmöglich per E-Mail bei Ihnen.<\u002Fp>\n  <div style=\"background:#fff;border:1px solid #e6eaef;border-radius:14px;padding:20px;text-align:left\">\n    <div style=\"font-size:11px;font-weight:700;color:#8a96a3;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px\">Ihre Anfrage<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n      <div><div style=\"font-size:11px;color:#9aa6b2;margin-bottom:2px\">Zeitraum<\u002Fdiv><div style=\"font-size:14px;font-weight:700;color:#1b2733;font-family:'DM Mono',monospace\">{{ successVon }} – {{ successBis }}<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-size:11px;color:#9aa6b2;margin-bottom:2px\">Name<\u002Fdiv><div style=\"font-size:14px;font-weight:700;color:#1b2733\">{{ successName }}<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- MAIN CONTENT -->\n<sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"max-width:960px;margin:0 auto;padding:28px 20px 60px\">\n\n  <!-- Intro -->\n  <div style=\"background:#fff;border:1px solid #e6eaef;border-radius:14px;padding:18px 22px;margin-bottom:20px;display:flex;align-items:center;gap:14px\">\n    <div style=\"width:36px;height:36px;border-radius:10px;background:#e9f1fb;display:flex;align-items:center;justify-content:center;flex-shrink:0\">\n      <svg width=\"18\" height=\"18\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"#3b82d6\" stroke-width=\"1.7\"><circle cx=\"10\" cy=\"10\" r=\"7.5\"><\u002Fcircle><line x1=\"10\" y1=\"9\" x2=\"10\" y2=\"14\"><\u002Fline><circle cx=\"10\" cy=\"6.5\" r=\".8\" fill=\"#3b82d6\" stroke=\"none\"><\u002Fcircle><\u002Fsvg>\n    <\u002Fdiv>\n    <div style=\"font-size:13.5px;color:#3a4854;line-height:1.6\">Wählen Sie im Kalender Ihren gewünschten Zeitraum — <strong style=\"color:#142029\">grüne Tage sind verfügbar<\u002Fstrong>. Füllen Sie dann das Formular aus und schicken Sie Ihre Anfrage ab.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- CALENDAR CARD -->\n  <div style=\"background:#fff;border:1px solid #e6eaef;border-radius:16px;padding:24px;margin-bottom:20px\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:20px\">\n      <button onclick=\"{{ prevCal }}\" style-hover=\"background:#eef2f7\" style=\"width:36px;height:36px;border-radius:9px;border:1px solid #e6eaef;background:#f6f8fb;cursor:pointer;font-size:18px;color:#3a4854;display:flex;align-items:center;justify-content:center;line-height:1\">‹<\u002Fbutton>\n      <div style=\"font-size:16px;font-weight:700;color:#142029\">{{ calHeader }}<\u002Fdiv>\n      <button onclick=\"{{ nextCal }}\" style-hover=\"background:#eef2f7\" style=\"width:36px;height:36px;border-radius:9px;border:1px solid #e6eaef;background:#f6f8fb;cursor:pointer;font-size:18px;color:#3a4854;display:flex;align-items:center;justify-content:center;line-height:1\">›<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- Weekday labels -->\n    <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px\">\n      <div style=\"text-align:center;font-size:11px;font-weight:700;color:#9aa6b2;padding:4px\">Mo<\u002Fdiv>\n      <div style=\"text-align:center;font-size:11px;font-weight:700;color:#9aa6b2;padding:4px\">Di<\u002Fdiv>\n      <div style=\"text-align:center;font-size:11px;font-weight:700;color:#9aa6b2;padding:4px\">Mi<\u002Fdiv>\n      <div style=\"text-align:center;font-size:11px;font-weight:700;color:#9aa6b2;padding:4px\">Do<\u002Fdiv>\n      <div style=\"text-align:center;font-size:11px;font-weight:700;color:#9aa6b2;padding:4px\">Fr<\u002Fdiv>\n      <div style=\"text-align:center;font-size:11px;font-weight:600;color:#b0b8c4;padding:4px\">Sa<\u002Fdiv>\n      <div style=\"text-align:center;font-size:11px;font-weight:600;color:#b0b8c4;padding:4px\">So<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Day grid -->\n    <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:4px\">\n      <sc-for list=\"{{ calDays }}\" as=\"cell\" hint-placeholder-count=\"35\">\n        <div onclick=\"{{ cell.onClick }}\" style=\"text-align:center;padding:7px 2px;border-radius:9px;font-size:13.5px;font-weight:{{ cell.fw }};background:{{ cell.bg }};color:{{ cell.color }};cursor:{{ cell.cursor }};border:{{ cell.border }};opacity:{{ cell.opacity }};min-height:36px;display:flex;align-items:center;justify-content:center;transition:filter .1s\" style-hover=\"{{ cell.hoverStyle }}\">{{ cell.label }}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- Hinweis wenn Kalender noch nicht synchronisiert -->\n    <sc-if value=\"{{ calNotLoaded }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"text-align:center;padding:16px;color:#9aa6b2;font-size:13px\">Verfügbarkeit wird geladen …<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Legend -->\n    <div style=\"display:flex;align-items:center;gap:18px;margin-top:16px;padding-top:14px;border-top:1px solid #f0f2f5;flex-wrap:wrap\">\n      <div style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:#5a6675\"><div style=\"width:14px;height:14px;border-radius:4px;background:#f0f9f4;border:1px solid #b8dfcb\"><\u002Fdiv>Verfügbar<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:#5a6675\"><div style=\"width:14px;height:14px;border-radius:4px;background:#fbecec;border:1px solid #e8bcbb\"><\u002Fdiv>Belegt<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:#5a6675\"><div style=\"width:14px;height:14px;border-radius:4px;background:#3b82d6\"><\u002Fdiv>Ausgewählt<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:#5a6675\"><div style=\"width:14px;height:14px;border-radius:4px;background:#e9f1fb;border:1px solid #c8d9f0\"><\u002Fdiv>Zeitraum<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Date range indicator -->\n  <sc-if value=\"{{ hasSelection }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"background:#e9f1fb;border:1px solid #c8d9f0;border-radius:12px;padding:13px 18px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:14px;animation:fadeIn .2s\">\n    <div style=\"display:flex;align-items:center;gap:12px\">\n      <svg width=\"18\" height=\"18\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"#3b82d6\" stroke-width=\"1.7\"><rect x=\"3\" y=\"4.5\" width=\"14\" height=\"12.5\" rx=\"2\"><\u002Frect><line x1=\"3\" y1=\"8.5\" x2=\"17\" y2=\"8.5\"><\u002Fline><line x1=\"7\" y1=\"2.5\" x2=\"7\" y2=\"6\"><\u002Fline><line x1=\"13\" y1=\"2.5\" x2=\"13\" y2=\"6\"><\u002Fline><\u002Fsvg>\n      <div>\n        <div style=\"font-size:14px;font-weight:700;color:#1b5fb8\">{{ selLabel }}<\u002Fdiv>\n        <div style=\"font-size:12px;color:#4a7ab8;margin-top:1px\">{{ selHint }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <button onclick=\"{{ clearSel }}\" style-hover=\"background:#d8e8f8\" style=\"background:rgba(59,130,214,.15);border:none;border-radius:8px;padding:6px 12px;font-family:'Hanken Grotesk',sans-serif;font-size:12px;font-weight:600;color:#1b5fb8;cursor:pointer\">✕ Zurücksetzen<\u002Fbutton>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- FORM CARD -->\n  <div style=\"background:#fff;border:1px solid #e6eaef;border-radius:16px;padding:28px\">\n    <div style=\"font-size:17px;font-weight:800;color:#142029;margin-bottom:4px\">Ihre Anfrage<\u002Fdiv>\n    <div style=\"font-size:13px;color:#8a96a3;margin-bottom:24px\">Felder mit * sind Pflichtfelder. Wir antworten innerhalb von 24 Stunden.<\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n      <div>\n        <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6675;margin-bottom:6px\">Name *<\u002Flabel>\n        <input value=\"{{ form.name }}\" oninput=\"{{ onName }}\" type=\"text\" placeholder=\"Vor- und Nachname\" style=\"width:100%;padding:11px 13px;border:1.5px solid #d7dde4;border-radius:10px;font-size:14px;color:#1b2733;transition:border-color .12s\">\n      <\u002Fdiv>\n      <div>\n        <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6675;margin-bottom:6px\">Firma/Verein <span style=\"color:#b0b8c4;font-weight:400\">(optional)<\u002Fspan><\u002Flabel>\n        <input value=\"{{ form.company }}\" oninput=\"{{ onCompany }}\" type=\"text\" placeholder=\"Firma oder Verein\" style=\"width:100%;padding:11px 13px;border:1.5px solid #d7dde4;border-radius:10px;font-size:14px;color:#1b2733;transition:border-color .12s\">\n      <\u002Fdiv>\n      <div>\n        <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6675;margin-bottom:6px\">E-Mail *<\u002Flabel>\n        <input value=\"{{ form.email }}\" oninput=\"{{ onEmail }}\" type=\"email\" placeholder=\"ihre@email.at\" style=\"width:100%;padding:11px 13px;border:1.5px solid #d7dde4;border-radius:10px;font-size:14px;color:#1b2733;transition:border-color .12s\">\n      <\u002Fdiv>\n      <div>\n        <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6675;margin-bottom:6px\">Telefon <span style=\"color:#b0b8c4;font-weight:400\">(optional)<\u002Fspan><\u002Flabel>\n        <input value=\"{{ form.phone }}\" oninput=\"{{ onPhone }}\" type=\"tel\" placeholder=\"0664 ...\" style=\"width:100%;padding:11px 13px;border:1.5px solid #d7dde4;border-radius:10px;font-size:14px;color:#1b2733;transition:border-color .12s\">\n      <\u002Fdiv>\n      <div>\n        <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6675;margin-bottom:6px\">Von (Datum) *<\u002Flabel>\n        <input value=\"{{ form.fromDate }}\" oninput=\"{{ onFromDate }}\" type=\"date\" style=\"width:100%;padding:11px 13px;border:1.5px solid #d7dde4;border-radius:10px;font-size:14px;color:#1b2733;transition:border-color .12s\">\n      <\u002Fdiv>\n      <div>\n        <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6675;margin-bottom:6px\">Bis (Datum) *<\u002Flabel>\n        <input value=\"{{ form.toDate }}\" oninput=\"{{ onToDate }}\" type=\"date\" style=\"width:100%;padding:11px 13px;border:1.5px solid #d7dde4;border-radius:10px;font-size:14px;color:#1b2733;transition:border-color .12s\">\n      <\u002Fdiv>\n      <div style=\"grid-column:span 2\">\n        <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6675;margin-bottom:6px\">Verwendungszweck <span style=\"color:#b0b8c4;font-weight:400\">(optional)<\u002Fspan><\u002Flabel>\n        <input value=\"{{ form.purpose }}\" oninput=\"{{ onPurpose }}\" type=\"text\" placeholder=\"z.B. Hochzeit, Vereinsfest, Catering, Firmenfeier …\" style=\"width:100%;padding:11px 13px;border:1.5px solid #d7dde4;border-radius:10px;font-size:14px;color:#1b2733;transition:border-color .12s\">\n      <\u002Fdiv>\n      <div style=\"grid-column:span 2\">\n        <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6675;margin-bottom:6px\">Nachricht <span style=\"color:#b0b8c4;font-weight:400\">(optional)<\u002Fspan><\u002Flabel>\n        <textarea value=\"{{ form.message }}\" oninput=\"{{ onMessage }}\" placeholder=\"Weitere Informationen oder Fragen …\" rows=\"3\" style=\"width:100%;padding:11px 13px;border:1.5px solid #d7dde4;border-radius:10px;font-size:14px;color:#1b2733;resize:vertical;transition:border-color .12s\"><\u002Ftextarea>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:{{ errorDisplay }};background:#fbecec;border:1px solid #e8bcbb;border-radius:9px;padding:11px 14px;margin-top:16px;font-size:13px;color:#9a3b38\">{{ errorMsg }}<\u002Fdiv>\n\n    <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:22px;padding-top:18px;border-top:1px solid #f0f2f5\">\n      <div style=\"font-size:12px;color:#9aa6b2\">Ihre Daten werden vertraulich behandelt.<\u002Fdiv>\n      <button onclick=\"{{ submitForm }}\" style-hover=\"background:#2c63b0\" style=\"background:#3b82d6;color:#fff;border:none;border-radius:11px;padding:13px 28px;font-size:14.5px;font-weight:700;cursor:pointer;transition:background .12s\">{{ submitLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:960,&quot;height&quot;:700},&quot;pbUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://kw.hofreither.at&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Konfiguration&quot;}}\">\nclass Component extends DCLogic {\n  PB_URL = 'https://kw.hofreither.at';\n  MONTHS = ['Jänner','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];\n\n  state = {\n    calYear: new Date().getFullYear(),\n    calMonth: new Date().getMonth() + 1,\n    busyRanges: [],\n    selFrom: null,\n    selTo: null,\n    form: { name:'', email:'', phone:'', company:'', fromDate:'', toDate:'', purpose:'', message:'' },\n    submitted: false,\n    submitting: false,\n    errorMsg: '',\n    successName: '', successVon: '', successBis: ''\n  };\n\n  componentDidMount() {\n    this.loadBusyDates();\n    this._refreshInterval = setInterval(() => this.loadBusyDates(), 5 * 60 * 1000);\n  }\n\n  componentWillUnmount() {\n    clearInterval(this._refreshInterval);\n  }\n\n  loadBusyDates() {\n    const url = (this.props.pbUrl || this.PB_URL) + '/api/collections/kw_calendar/records?perPage=1';\n    fetch(url)\n      .then(r => r.json())\n      .then(data => {\n        if (data.items && data.items.length > 0) {\n          let raw = data.items[0].data;\n          // PocketBase kann JSON-Feld als String zurückgeben\n          if (typeof raw === 'string') { try { raw = JSON.parse(raw); } catch(e) { raw = []; } }\n          if (Array.isArray(raw)) {\n            this.setState({ busyRanges: raw, calLoaded: true });\n          } else {\n            this.setState({ busyRanges: [], calLoaded: true });\n          }\n        } else {\n          this.setState({ busyRanges: [], calLoaded: true });\n        }\n      })\n      .catch(() => { this.setState({ calLoaded: true }); });\n  }\n\n  isRangeAvailable(fromDate, toDate) {\n    return !this.state.busyRanges.some(r => {\n      const rFrom = r.from || r.von || '';\n      const rTo   = r.to   || r.bis || '';\n      if (!rFrom || !rTo) return false;\n      return fromDate <= rTo && rFrom <= toDate;\n    });\n  }\n\n  today() { const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }\n  fmtDate(s) { if(!s) return ''; const [y,m,d] = s.split('-'); return d+'.'+m+'.'+y.slice(2); }\n\n  isDateBusy(dateStr) {\n    return this.state.busyRanges.some(r => dateStr >= (r.from||r.von||'') && dateStr <= (r.to||r.bis||''));\n  }\n\n  buildCalDays(year, month) {\n    const tod = this.today();\n    const daysInMonth = new Date(year, month, 0).getDate();\n    const firstWeekday = (new Date(year, month - 1, 1).getDay() + 6) % 7;\n    const s = this.state;\n    const cells = [];\n\n    for (let i = 0; i < firstWeekday; i++) {\n      cells.push({ key:'e'+i, label:'', bg:'transparent', color:'transparent', cursor:'default', fw:'400', border:'none', opacity:'1', onClick:null, hoverStyle:'' });\n    }\n\n    for (let d = 1; d <= daysInMonth; d++) {\n      const dateStr = year+'-'+String(month).padStart(2,'0')+'-'+String(d).padStart(2,'0');\n      const isBusy = this.isDateBusy(dateStr);\n      const isPast = dateStr < tod;\n      const isToday = dateStr === tod;\n      const isStart = dateStr === s.selFrom;\n      const isEnd = dateStr === s.selTo;\n      const isInRange = s.selFrom && s.selTo && dateStr > s.selFrom && dateStr < s.selTo;\n      const disabled = isPast || isBusy;\n\n      let bg, color, border = '1px solid transparent', hoverStyle = '';\n      if (isStart || isEnd) { bg = '#3b82d6'; color = '#fff'; }\n      else if (isInRange) { bg = '#e9f1fb'; color = '#1b5fb8'; }\n      else if (isBusy) { bg = '#fbecec'; color = '#c25450'; }\n      else if (isPast) { bg = '#f6f8fb'; color = '#c8d0d8'; }\n      else { bg = '#f0f9f4'; color = '#1d6e48'; hoverStyle = 'filter:brightness(.94)'; }\n\n      if (isToday && !isStart && !isEnd) border = '2px solid #3b82d6';\n\n      cells.push({\n        key: dateStr,\n        label: String(d),\n        bg, color,\n        cursor: disabled ? 'default' : 'pointer',\n        fw: (isStart || isEnd) ? '700' : '500',\n        border,\n        opacity: isPast ? '0.45' : '1',\n        hoverStyle,\n        onClick: disabled ? null : () => this.selectDate(dateStr)\n      });\n    }\n    return cells;\n  }\n\n  selectDate(dateStr) {\n    const s = this.state;\n    if (!s.selFrom || (s.selFrom && s.selTo) || dateStr < s.selFrom) {\n      this.setState({ selFrom: dateStr, selTo: null, form: { ...s.form, fromDate: dateStr, toDate: '' } });\n    } else {\n      this.setState({ selTo: dateStr, form: { ...s.form, toDate: dateStr } });\n    }\n  }\n\n  prevCal() {\n    let { calYear, calMonth } = this.state;\n    calMonth--;\n    if (calMonth < 1) { calMonth = 12; calYear--; }\n    this.setState({ calYear, calMonth });\n  }\n\n  nextCal() {\n    let { calYear, calMonth } = this.state;\n    calMonth++;\n    if (calMonth > 12) { calMonth = 1; calYear++; }\n    this.setState({ calYear, calMonth });\n  }\n\n  clearSel() {\n    this.setState({ selFrom: null, selTo: null, form: { ...this.state.form, fromDate: '', toDate: '' } });\n  }\n\n  submitForm() {\n    const s = this.state;\n    const f = s.form;\n    if (!f.name.trim()) { this.setState({ errorMsg: 'Bitte geben Sie Ihren Namen ein.' }); return; }\n    if (!f.email.trim() || !/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(f.email)) { this.setState({ errorMsg: 'Bitte geben Sie eine gültige E-Mail-Adresse ein (z.B. name@beispiel.at).' }); return; }\n    if (!f.fromDate) { this.setState({ errorMsg: 'Bitte wählen Sie ein Startdatum (im Kalender oder im Feld „Von\").' }); return; }\n    if (!f.toDate) { this.setState({ errorMsg: 'Bitte wählen Sie ein Enddatum (im Kalender oder im Feld „Bis\").' }); return; }\n    if (f.toDate < f.fromDate) { this.setState({ errorMsg: 'Das Enddatum muss nach dem Startdatum liegen.' }); return; }\n    if (!this.isRangeAvailable(f.fromDate, f.toDate)) {\n      this.setState({ errorMsg: 'Der gewählte Zeitraum ist leider nicht verfügbar. Bitte wählen Sie einen anderen Termin.' });\n      return;\n    }\n    if (!window.PocketBase) { this.setState({ errorMsg: 'Verbindungsfehler. Bitte Seite neu laden.' }); return; }\n\n    this.setState({ submitting: true, errorMsg: '' });\n    const pb = new window.PocketBase(this.props.pbUrl || this.PB_URL);\n    pb.collection('kw_booking_requests').create({\n      name: f.name, email: f.email, phone: f.phone, company: f.company,\n      from_date: f.fromDate, to_date: f.toDate,\n      purpose: f.purpose, message: f.message, status: 'pending'\n    }).then(() => {\n      this.setState({ submitted: true, submitting: false, successName: f.name, successVon: this.fmtDate(f.fromDate), successBis: this.fmtDate(f.toDate) });\n    }).catch(() => {\n      this.setState({ submitting: false, errorMsg: 'Fehler beim Senden. Bitte versuchen Sie es erneut.' });\n    });\n  }\n\n  renderVals() {\n    const s = this.state;\n    const calDays = this.buildCalDays(s.calYear, s.calMonth);\n\n    let selLabel = '', selHint = '';\n    if (s.selFrom && s.selTo) {\n      selLabel = this.fmtDate(s.selFrom) + ' bis ' + this.fmtDate(s.selTo);\n      selHint = 'Klicken Sie auf ein Datum um neu zu beginnen';\n    } else if (s.selFrom) {\n      selLabel = 'Start: ' + this.fmtDate(s.selFrom);\n      selHint = 'Bitte Enddatum im Kalender wählen';\n    }\n\n    return {\n      calDays,\n      calNotLoaded: !s.calLoaded,\n      calHeader: this.MONTHS[s.calMonth - 1] + ' ' + s.calYear,\n      prevCal: () => this.prevCal(),\n      nextCal: () => this.nextCal(),\n      hasSelection: !!s.selFrom,\n      selLabel, selHint,\n      clearSel: () => this.clearSel(),\n      submitted: s.submitted,\n      notSubmitted: !s.submitted,\n      successName: s.successName,\n      successVon: s.successVon,\n      successBis: s.successBis,\n      form: s.form,\n      onName: e => this.setState({ form: { ...s.form, name: e.target.value } }),\n      onEmail: e => this.setState({ form: { ...s.form, email: e.target.value } }),\n      onPhone: e => this.setState({ form: { ...s.form, phone: e.target.value } }),\n      onCompany: e => this.setState({ form: { ...s.form, company: e.target.value } }),\n      onFromDate: e => { const v = e.target.value; this.setState({ form: { ...s.form, fromDate: v }, selFrom: v || null, selTo: v ? s.selTo : null }); },\n      onToDate: e => { const v = e.target.value; this.setState({ form: { ...s.form, toDate: v }, selTo: v || null }); },\n      onPurpose: e => this.setState({ form: { ...s.form, purpose: e.target.value } }),\n      onMessage: e => this.setState({ form: { ...s.form, message: e.target.value } }),\n      errorMsg: s.errorMsg,\n      errorDisplay: s.errorMsg ? 'block' : 'none',\n      submitLabel: s.submitting ? 'Wird gesendet …' : 'Anfrage absenden →',\n      submitForm: () => this.submitForm()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
