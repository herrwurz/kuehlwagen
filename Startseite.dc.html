<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<template id="__bundler_thumbnail" data-bg-color="#142029">
  <svg viewBox="0 0 480 320" xmlns="http://www.w3.org/2000/svg">
    <rect width="480" height="320" fill="#142029"/>
    <rect x="140" y="80" width="200" height="60" rx="12" fill="#1e2e3a"/>
    <rect x="140" y="160" width="200" height="60" rx="12" fill="#1e2e3a"/>
    <rect x="152" y="92" width="36" height="36" rx="8" fill="#3b82d6"/>
    <rect x="152" y="172" width="36" height="36" rx="8" fill="#2f9e6a"/>
    <text x="240" y="116" font-family="sans-serif" font-size="13" fill="#fff" text-anchor="middle">Kühlwagen mieten</text>
    <text x="240" y="196" font-family="sans-serif" font-size="13" fill="#fff" text-anchor="middle">Verwaltung</text>
  </svg>
</template>

<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hanken Grotesk', sans-serif; background: linear-gradient(160deg, #e8f0f7 0%, #d4e4f2 40%, #c8dbe8 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
</style>
</helmet>

<div style="width:100%;max-width:480px;padding:32px 20px;animation:fadeUp .5s ease">

  <!-- Logo + Titel -->
  <div style="text-align:center;margin-bottom:40px">
    <img src="uploads/stvalentin-logo-blau.png" style="height:52px;width:auto;margin-bottom:20px;display:block;margin-left:auto;margin-right:auto">
    <div style="font-size:13px;font-weight:600;color:#5a7a9a;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px">Stadtgemeinde St. Valentin</div>
    <h1 style="font-size:26px;font-weight:800;color:#142029;letter-spacing:-.5px">Kühlwagen-Verleih</h1>
  </div>

  <!-- Buttons -->
  <div style="display:flex;flex-direction:column;gap:14px">

    <!-- Mieten -->
    <a href="buchung.html" style="text-decoration:none;display:flex;align-items:center;gap:18px;background:#fff;border:1px solid #c8dbe8;border-radius:16px;padding:22px 24px;transition:all .15s;cursor:pointer;box-shadow:0 2px 12px rgba(59,130,214,.08)" style-hover="border-color:#3b82d6;box-shadow:0 4px 20px rgba(59,130,214,.15)">
      <div style="width:48px;height:48px;border-radius:14px;background:#3b82d6;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
      </div>
      <div style="flex:1">
        <div style="font-size:17px;font-weight:700;color:#142029;margin-bottom:3px">Kühlwagen mieten</div>
        <div style="font-size:13px;color:#6a8a9a">Verfügbarkeit prüfen &amp; Anfrage stellen</div>
      </div>
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="#3b82d6" stroke-width="2" stroke-linecap="round"><polyline points="7 4 13 10 7 16"/></svg>
    </a>

    <!-- Verwaltung -->
    <a href="index.html" style="text-decoration:none;display:flex;align-items:center;gap:18px;background:#fff;border:1px solid #c8dbe8;border-radius:16px;padding:22px 24px;transition:all .15s;cursor:pointer;box-shadow:0 2px 12px rgba(47,158,106,.08)" style-hover="border-color:#2f9e6a;box-shadow:0 4px 20px rgba(47,158,106,.15)">
      <div style="width:48px;height:48px;border-radius:14px;background:#2f9e6a;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </div>
      <div style="flex:1">
        <div style="font-size:17px;font-weight:700;color:#142029;margin-bottom:3px">Verwaltung</div>
        <div style="font-size:13px;color:#6a8a9a">Nur für Mitarbeiter der Gemeinde</div>
      </div>
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="#2f9e6a" stroke-width="2" stroke-linecap="round"><polyline points="7 4 13 10 7 16"/></svg>
    </a>

  </div>

  <div style="text-align:center;margin-top:32px;font-size:12px;color:#8a9aaa">© Stadtgemeinde St. Valentin · Kühlwagen-Verleih</div>
</div>
</x-dc>
</body>
</html>
