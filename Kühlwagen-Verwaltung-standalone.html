  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

alse }}\">\n      <div style=\"max-width:820px;display:flex;flex-direction:column;gap:16px\">\n\n        <!-- Fahrzeuge -->\n        <div style=\"background:#fff;border:1px solid #e6eaef;border-radius:14px;padding:24px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:20px\">\n            <div style=\"display:flex;align-items:center;gap:11px\">\n              <div style=\"width:36px;height:36px;border-radius:10px;background:#e9f1fb;display:flex;align-items:center;justify-content:center;flex-shrink:0\">\n                <svg width=\"18\" height=\"18\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"#1b5fb8\" stroke-width=\"1.7\" stroke-linecap=\"round\"><rect x=\"2\" y=\"8\" width=\"16\" height=\"9\" rx=\"2\"><\u002Frect><path d=\"M6 8V6a4 4 0 018 0v2\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div>\n                <div style=\"font-size:15px;font-weight:700\">Fahrzeuge<\u002Fdiv>\n                <div style=\"font-size:12px;color:#8a96a3\">{{ vehicleCount }} Fahrzeug(e) verwaltet<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ addVehicle }}\" style-hover=\"background:#e9f1fb\" style=\"display:flex;align-items:center;gap:7px;background:#f0f5fc;color:#1b5fb8;border:1px solid #c8d9f0;border-radius:10px;padding:9px 14px;font-family:'Hanken Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .12s\">\n              <svg width=\"13\" height=\"13\" viewBox=\"0 0 14 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\"><line x1=\"7\" y1=\"2\" x2=\"7\" y2=\"12\"><\u002Fline><line x1=\"2\" y1=\"7\" x2=\"12\" y2=\"7\"><\u002Fline><\u002Fsvg>\n              Fahrzeug\n            <\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:14px\">\n            <sc-for list=\"{{ vehicleCards }}\" as=\"vc\" hint-placeholder-count=\"1\">\n und .12s\">\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><line x1=\"7\" y1=\"1\" x2=\"7\" y2=\"9\"><\u002Fline><polyline points=\"4 6 7 9 10 6\"><\u002Fpolyline><rect x=\"1\" y=\"11\" width=\"12\" height=\"1.5\" rx=\".75\"><\u002Frect><\u002Fsvg>\n              Backup exportieren (.json)\n            <\u002Fbutton>\n            <label style-hover=\"background:#e9f1fb\" style=\"display:flex;align-items:center;gap:8px;background:#f0f5fc;color:#1b5fb8;border:1px solid #c8d9f0;border-radius:10px;padding:11px 18px;font-family:'Hanken Grotesk',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;transition:background .12s\">\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><line x1=\"7\" y1=\"9\" x2=\"7\" y2=\"1\"><\u002Fline><polyline points=\"4 4 7 1 10 4\"><\u002Fpolyline><rect x=\"1\" y=\"11\" width=\"12\" height=\"1.5\" rx=\".75\"><\u002Frect><\u002Fsvg>\n              Backup importieren\n              <input type=\"file\" accept=\".json\" onchange=\"{{ importBackup }}\" style=\"display:none\">\n            <\u002Flabel>\n          <\u002Fdiv>\n          <div style=\"font-size:12px;color:#7a8794;background:#f6f8fb;border-radius:9px;padding:11px 14px;line-height:1.6\">Enthält alle Buchungen, Wartungseinträge und Stammdaten. Kann auf einem anderen Gerät importiert werden.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;justify-content:flex-end;padding-bottom:8px\">\n          <button onclick=\"{{ saveStammdaten }}\" style-hover=\"background:#2c63b0\" style=\"background:#3b82d6;color:#fff;border:none;border-radius:11px;padding:13px 32px;font-family:'Hanken Grotesk',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .12s\">Änderungen speichern<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc rotesk',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer\">Ablehnen &amp; Mail senden<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- NEUE BUCHUNG MODAL -->\n<sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n<div onclick=\"{{ closeModal }}\" style=\"position:fixed;inset:0;background:rgba(20,32,41,.45);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:50\">\n  <div onclick=\"{{ stop }}\" style=\"width:560px;max-height:90vh;overflow-y:auto;background:#fff;border-radius:18px;box-shadow:0 20px 60px rgba(20,32,41,.3);animation:popIn .2s ease\">\n    <div style=\"padding:22px 26px;border-bottom:1px solid #eef1f5;display:flex;align-items:center;justify-content:space-between\">\n      <div style=\"font-size:18px;font-weight:700\">Neue Buchung<\u002Fdiv>\n      <button onclick=\"{{ closeModal }}\" style=\"background:#f0f2f5;border:none;width:32px;height:32px;border-radius:9px;cursor:pointer;color:#6a7785;font-size:17px;display:flex;align-items:center;justify-content:center\">✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"padding:24px 26px\">\n      <sc-if value=\"{{ multiVehicle }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-bottom:16px\">\n        <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6675;margin-bottom:7px\">Fahrzeug *<\u002Flabel>\n        <select value=\"{{ draft.vehicleId }}\" onchange=\"{{ onDraft }}\" data-field=\"vehicleId\" style=\"width:100%;padding:11px 13px;border:1px solid #d7dde4;border-radius:10px;font-family:'Hanken Grotesk',sans-serif;font-size:14px;color:#1b2733;outline:none;background:#fff;cursor:pointer\">\n          <sc-for list=\"{{ vehicleOptions }}\" as=\"vo\" hint-placeholder-count=\"1\">\n            <option value=\"{{ vo.id }}\">{{ vo.name }} ({{ vo.kennz }})<\u002Foption>\n          <\u002Fsc-for>\n        <\u002Fselect>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"margin-bottom:16px\">\n        <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6675;margin-bottom:7px\">Kunde *<\u002Flabel>\n        <input value=\"{{ draft.kunde }}\" oninput=\"{{ onDraft }}\" data-field=\"kunde\" placeholder=\"Name oder Firma\" style-focus=\"border-color:#3b82d6\" style=\"width:100%;padding:11px 13px;border:1px solid #d7dde4;border-radius:10px;font-family:'Hanken Grotesk',sans-serif;font-size:14px;color:#1b2733;outline:none;transition:border-color .12s\">\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px\">\n        <div>\n          <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6675;margin-bottom:7px\">Telefon<\u002Flabel>\n          <input value=\"{{ draft.telefon }}\" oninput=\"{{ onDraft }}\" data-field=\"telefon\" placeholder=\"0664 …\" style-focus=\"border-color:#3b82d6\" style=\"width:100%;padding:11px 13px;border:1px solid #d7dde4;border-radius:10px;font-family:'Hanken Grotesk',sans-serif;font-size:14px;color:#1b2733;outline:none;transition:border-color .12s\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6675;margin-bottom:7px\">Anlass<\u002Flabel>\n          <input value=\"{{ draft.grund }}\" oninput=\"{{ onDraft }}\" data-field=\"grund\" placeholder=\"z.B. Hochzeit\" style-focus=\"border-color:#3b82d6\" style=\"width:100%;padding:11px 13px;border:1px solid #d7dde4;border-radius:10px;font-family:'Hanken Grotesk',sans-serif;font-size:14px;color:#1b2733;outline:none;transition:border-color .12s\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-bottom:16px\">\n        <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6675;margin-bottom:7px\">E-Mail (optional)<\u002Flabel>\n        <input value=\"{{ draft.email }}\" oninput=\"{{ onDraft }}\" data-field=\"email\" placeholder=\"kunde@beispiel.at\" style-focus=\"border-color:#3b82d6\" style= preis\" type=\"number\" style-focus=\"border-color:#3b82d6\" style=\"width:100%;padding:11px 13px;border:1px solid #d7dde4;border-radius:10px;font-family:'DM Mono',monospace;font-size:14px;color:#1b2733;outline:none;transition:border-color .12s\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6675;margin-bottom:7px\">Kaution (€)<\u002Flabel>\n          <input value=\"{{ draft.kaution }}\" oninput=\"{{ onDraft }}\" data-field=\"kaution\" type=\"number\" style-focus=\"border-color:#3b82d6\" style=\"width:100%;padding:11px 13px;border:1px solid #d7dde4;border-radius:10px;font-family:'DM Mono',monospace;font-size:14px;color:#1b2733;outline:none;transition:border-color .12s\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <label style=\"display:block;font-size:12px;font-weight:600;color:#5a6675;margin-bottom:7px\">Notiz<\u002Flabel>\n        <textarea value=\"{{ draft.notiz }}\" oninput=\"{{ onDraft }}\" data-field=\"notiz\" placeholder=\"Interne Notiz …\" style-focus=\"border-color:#3b82d6\" style=\"width:100%;min-height:58px;padding:11px 13px;border:1px solid #d7dde4;border-radius:10px;font-family:'Hanken Grotesk',sans-serif;font-size:14px;color:#1b2733;outline:none;resize:vertical;transition:border-color .12s\"><\u002Ftextarea>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"padding:16px 26px;border-top:1px solid #eef1f5;display:flex;gap:12px;justify-content:flex-end\">\n      <button onclick=\"{{ closeModal }}\" style=\"background:#f0f2f5;border:none;border-radius:10px;padding:11px 18px;font-family:'Hanken Grotesk',sans-serif;font-size:13.5px;font-weight:600;color:#5a6675;cursor:pointer\">Abbrechen<\u002Fbutton>\n      <button onclick=\"{{ submitBooking }}\" style-hover=\"background:#2c63b0\" style=\"background:#3b82d6;color:#fff;border:none;border-radius:10px;padding:11px 22px;font-family:'Hanken Grotesk',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;transition:b  <div style=\"display:flex;justify-content:space-between;padding:13px 0;border-top:2px solid #2f9e6a\">\n          <span style=\"font-size:15px;font-weight:700;color:#1b2733\">Angebotsbetrag<\u002Fspan>\n          <span style=\"font-family:'DM Mono',monospace;font-size:15px;font-weight:700;color:#1b2733\">{{ angBetrag }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:12px;color:#8a96a3;margin-top:3px;text-align:right\">inkl. 20% MwSt.<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#7a8794;margin-top:12px;padding:11px 14px;background:#f6f8fb;border-radius:10px;line-height:1.5\">Kaution: {{ angKaution }}<br>(rückerstattbar nach Rückgabe)<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid #eef1f5;padding-top:20px\">\n      <div style=\"font-size:12px;color:#8a96a3;font-style:italic\">Dieses Angebot ist unverbindlich und vorbehaltlich der Verfügbarkeit. Gültig bis {{ angGueltigBis }}.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"no-print\" style=\"display:flex;justify-content:center;gap:12px;margin-top:40px;padding-top:28px;border-top:1px solid #eef1f5\">\n      <button onclick=\"{{ closeAngebot }}\" style=\"background:#f0f2f5;border:none;border-radius:10px;padding:12px 20px;font-family:'Hanken Grotesk',sans-serif;font-size:13.5px;font-weight:600;color:#5a6675;cursor:pointer\">Schließen<\u002Fbutton>\n      <button onclick=\"{{ doPrint }}\" style-hover=\"background:#239e5a\" style=\"background:#2f9e6a;color:#fff;border:none;border-radius:10px;padding:12px 24px;font-family:'Hanken Grotesk',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;transition:background .12s\">🖨 Drucken / Als PDF speichern<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: {&quot;width&quot;: 1440, &quot;height&quot;: 900}\n}\">\nclass Component extends DCLogic {\n  MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];\n  MONTHS_SHORT = ['JAN','FEB','MÄR','APR','MAI','JUN','JUL','AUG','SEP','OKT','NOV','DEZ'];\n  PALETTE = ['#e05252','#e87848','#f0b030','#c0c830','#60c048','#2ab870','#26b8a8','#2aa8d0','#3a7cd6','#4e60d8','#7e50d8','#b040c8','#d840a0','#e03860','#9e7030','#56788a'];\n  VEH_COLORS = ['#3b82d6','#2f9e6a','#d98a2b','#e05252','#7e50d8'];\n  TODAY = '2026-06-29';\n  history = { months:['Jan','Feb','Mär','Apr','Mai','Jun'], ausl:[38,42,51,60,66,57], umsatz:[980,1120,1360,1615,1870,1445] };\n\n  state = {\n    view: 'dashboard',\n    bookings: [\n      {id:'B-2041',kunde:'Familie Kogler',telefon:'0664 1234567',von:'2026-06-05',bis:'2026-06-07',grund:'Hochzeit',preis:255,kaution:300,notiz:'',status:'abgeschlossen',kmRaus:45120,kmRein:45290,rechnung:{nr:'R-2026-018',bezahlt:true,gemahnt:false},color:null,vehicleId:'v1'},\n      {id:'B-2042',kunde:'Gasthaus Brandner',telefon:'0512 998877',von:'2026-06-12',bis:'2026-06-14',grund:'Catering',preis:255,kaution:300,notiz:'Stammkunde, Rechnung per Post.',status:'abgeschlossen',kmRaus:45290,kmRein:45355,rechnung:{nr:'R-2026-019',bezahlt:false,gemahnt:false},color:'#2ab870',vehicleId:'v1'},\n      {id:'B-2043',kunde:'Sportverein Aldrans',telefon:'0676 222333',von:'2026-06-19',bis:'2026-06-22',grund:'Vereinsfest',preis:340,kaution:300,notiz:'',status:'abgeschlossen',kmRaus:45355,kmRein:45498,rechnung:{nr:'R-2026-020',bezahlt:true,gemahnt:false},color:'#e87848',vehicleId:'v1'},\n      {id:'B-2044',kunde:'Markus Steiner',telefon:'0660 445566',von:'2026-06-24',bis:'2026-06-29',grund:'Geburtstag',preis:510,kaution:300,notiz:'Abholung 8 Uhr.',status:'laufend',kmRaus:45498,kmRein:null,rechnung:null,color:'#3a7cd6',vehicleId:'v1'},\n      {id:'B-2045',kunde:'Weingut Hofer',telefon:'0664 778899',von:'2026-06-30',bis:'2026-07-03',grund:'Hofmesse',preis:340,kaution:300,notiz:'',status:'bestätigt',kmRaus:null,kmRein:null,rechnung:null,color:'#7e50d8',vehicleId:'v1'},\n      {id:'B-2046',kunde:'Eventagentur Nord',telefon:'0720 101010',von:'2026-07-07',bis:'2026-07-09',grund:'Firmenfeier',preis:255,kaution:350,notiz:'Lieferung gewünscht.',status:'angefragt',kmRaus:null,kmRein:null,rechnung:null,color:null,vehicleId:'v1'}\n    ],\n    kmCurrent: 45498,\n    letzteReinigung: '2026-06-22',\n    modalOpen: false,\n    draft: {kunde:'',telefon:'',email:'',grund:'',von:'',bis:'',preis:'',kaution:'300',notiz:'',vehicleId:'v1'},\n    selectedId: null,\n    protocolId: null,\n    protoPhase: 'ausgabe',\n    proto: {km:'',tank:'voll',zustand:'',sauber:true,kaution:true},\n    toast: null,\n    calMonth: 6,\n    calYear: 2026,\n    printInvoiceId: null,\n    angebotId: null,\n    expandedKunde: null,\n    anfragen: [],\n    anfragenFilter: 'pending',\n    rejectId: null,\n    rejectNote: '',\n    sidebarOpen: true,\n    loggedIn: false,\n    loginEmail: '',\n    loginPassword: '',\n    loginError: '',\n    loginLoading: false,\n    pbRecordId: null,\n    syncing: false,\n    wartung: [],\n    wartungDraft: {vehicleId:'v1',type:'service',datum:'',km:'',beschreibung:''},\n    invoiceExtras: {},\n    extraDraft: {desc:'',betrag:''},\n    stammdaten: {\n      vehicles: [{id:'v1',name:'Kühlanhänger 1300',kennz:'IL-KÜHL 1',tagessatz:85,kaution:300,color:'#3b82d6'}],\n      firma:'Kühlwagen-Verleih Mustermann', strasse:'Musterstraße 1', plz:'6020', ort:'Innsbruck',\n      tel:'0512 123456', email:'info@kuehlverleih.at', uid:'',\n      kontoinhaber:'Kühlwagen-Verleih Mustermann', iban:'AT00 0000 0000 0000 0000', bic:'MUSTRAT21XXX', bank:''\n    }\n  };\n\n  // ---- helpers ----\n  getVehicles() { return (this.state.stammdaten.vehicles||[{id:'v1',name:'Kühlanhänger 1300',kennz:'IL-KÜHL 1',tagessatz:85,kaution:300,color:'#3b82d6'}]); }\n  getVehicle(id) { return this.getVehicles().find(v=>v.id===id)||this.getVehicles()[0]; }\n  emptyDraft() { const v=this.getVehicles()[0]; return {kunde:'',telefon:'',email:'',grund:'',von:'',bis:'',preis:'',kaution:String(v?.kaution||300),notiz:'',vehicleId:v?.id||'v1'}; }\n  parseD(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }\n  iso(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }\n  fmtD(s) { const [y,m,d]=s.split('-'); return d+'.'+m+'.'; }\n  fmtDLang(s) { const [y,m,d]=s.split('-'); return d+'.'+m+'.'+y.slice(2); }\n  fmtDFull(s) { const [y,m,d]=s.split('-'); return d+'.'+m+'.'+y; }\n  zeitraum(b) { return this.fmtD(b.von)+'–'+this.fmtD(b.bis); }\n  days(b) { return Math.round((this.parseD(b.bis)-this.parseD(b.von))/86400000)+1; }\n  money(n) { return '€ '+Number(n).toLocaleString('de-DE'); }\n  junDays(b) { const lo=this.parseD('2026-06-01'),hi=this.parseD('2026-06-30'); let s=this.parseD(b.von),e=this.parseD(b.bis); if(e<lo||s>hi)return 0; if(s<lo)s=lo; if(e>hi)e=hi; return Math.round((e-s)/86400000)+1; }\n  statusMeta(st) { const m={angefragt:{label:'Angefragt',fg:'#8a5a16',bg:'#fdf3e6',dot:'#d98a2b'},'bestätigt':{label:'Bestätigt',fg:'#1b5fb8',bg:'#e9f1fb',dot:'#3b82d6'},laufend:{label:'Unterwegs',fg:'#1d6e48',bg:'#e7f5ee',dot:'#2f9e6a'},abgeschlossen:{label:'Abgeschlossen',fg:'#5a6675',bg:'#f0f2f5',dot:'#8a96a3'},storniert:{label:'Storniert',fg:'#9a3b38',bg:'#fbecec',dot:'#c25450'}}; return m[st]||m.angefragt; }\n  isOverdue(b) { if(!b.rechnung||b.rechnung.bezahlt)return false; const due=new Date(this.parseD(b.bis).getTime()+14*86400000); return due<this.parseD(this.TODAY); }\n\n  // ---- nav ----\n  go(view) { this.setState({view,selectedId:null,protocolId:null,sidebarOpen:window.innerWidth>800}); }\n  toggleSidebar() { this.setState({sidebarOpen:!this.state.sidebarOpen}); }\n  closeSidebar() { this.setState({sidebarOpen:false}); }\n\n  // ---- vehicle mgmt ----\n  addVehicle() {\n    const c=this.VEH_COLORS[this.getVehicles().length%this.VEH_COLORS.length];\n    const v={id:'v'+Date.now(),name:'Fahrzeug '+(this.getVehicles().length+1),kennz:'',tagessatz:85,kaution:300,color:c};\n    this.setState({stammdaten:{...this.state.stammdaten,vehicles:[...this.getVehicles(),v]}});\n    this.toast('Fahrzeug hinzugefügt','ok');\n  }\n  removeVehicle(id) {\n    if(this.state.bookings.some(b=>(b.vehicleId||'v1')===id)){this.toast('Fahrzeug hat Buchungen – nicht löschbar','warn');return;}\n    this.setState({stammdaten:{...this.state.stammdaten,vehicles:this.getVehicles().filter(v=>v.id!==id)}});\n    this.toast('Fahrzeug entfernt','ok');\n  }\n  updateVehicle(id,field,value) {\n    const vehs=this.getVehicles().map(v=>v.id===id?{...v,[field]:(field==='tagessatz'||field==='kaution')?Number(value)||0:value}:v);\n    this.setState({stammdaten:{...this.state.stammdaten,vehicles:vehs}});\n  }\n  onVehicleField(e) { this.updateVehicle(e.target.dataset.vid,e.target.dataset.field,e.target.value); }\n  setVehicleColor(id,color) { this.updateVehicle(id,'color',color); }\n\n  // ---- modal ----\n  openModal(prefill) { const d=this.emptyDraft(); if(prefill){d.kunde=prefill.kunde||'';d.telefon=prefill.telefon||'';} this.setState({modalOpen:true,draft:d}); }\n  closeModal() { this.setState({modalOpen:false}); }\n  onDraft(e) {\n    const f=e.target.dataset.field,v=e.target.value;\n    const d={...this.state.draft,[f]:v};\n    if((f==='von'||f==='bis')&&d.von&&d.bis){\n      const dd=Math.round((this.parseD(d.bis)-this.parseD(d.von))/86400000)+1;\n      const veh=this.getVehicle(d.vehicleId);\n      if(dd>0)d.preis=String(dd*(veh?.tagessatz||85));\n    }\n    if(f==='vehicleId'){const veh=this.getVehicle(v);d.kaution=String(veh?.kaution||300);}\n    this.setState({draft:d});\n  }\n  nextBookingId() { const max=Math.max.apply(null,this.state.bookings.map(b=>+b.id.split('-')[1])); return 'B-'+(max+1); }\n  submitBooking() {\n    const d=this.state.draft;\n    if(!d.kunde||!d.von||!d.bis){this.toast('Bitte Kunde und Zeitraum angeben','warn');return;}\n    if(this.parseD(d.bis)<this.parseD(d.von)){this.toast('Enddatum vor Startdatum','warn');return;}\n    const dd=Math.round((this.parseD(d.bis)-this.parseD(d.von))/86400000)+1;\n    const veh=this.getVehicle(d.vehicleId);\n    const nb={id:this.nextBookingId(),kunde:d.kunde,telefon:d.telefon||'—',email:d.email||'',von:d.von,bis:d.bis,grund:d.grund||'—',preis:Number(d.preis)||dd*(veh?.tagessatz||85),kaution:Number(d.kaution)||0,notiz:d.notiz,status:'angefragt',kmRaus:null,kmRein:null,rechnung:null,color:null,vehicleId:d.vehicleId||'v1'};\n    this.setState({bookings:[...this.state.bookings,nb],modalOpen:false});\n    this.toast('Buchung '+nb.id+' angelegt','ok');\n  }\n\n  // ---- drawer ----\n  selectBooking(id){this.setState({selectedId:id,extraDraft:{desc:'',betrag:''}});}\n  closeDrawer(){this.setState({selectedId:null});}\n  stop(e){e.stopPropagation();}\n  updateBooking(id,patch){this.setState({bookings:this.state.bookings.map(b=>b.id===id?{...b,...patch}:b)});}\n  confirmBooking(id){this.updateBooking(id,{status:'bestätigt'});this.toast('Buchung bestätigt','ok');}\n  stornoBooking(id){this.updateBooking(id,{status:'storniert'});this.setState({selectedId:null});this.toast('Buchung storniert','warn');}\n  setBookingColor(id,color){this.updateBooking(id,{color});}\n\n  // ---- übergabe ----\n  startUebergabe(id){const b=this.state.bookings.find(x=>x.id===id);const phase=b.status==='laufend'?'ruecknahme':'ausgabe';this.setState({view:'uebergabe',protocolId:id,protoPhase:phase,selectedId:null,proto:{km:phase==='ausgabe'?String(this.state.kmCurrent):'',tank:'voll',zustand:'',sauber:true,kaution:true}});}\n  backToChooser(){this.setState({protocolId:null});}\n  onProto(e){const f=e.target.dataset.field;this.setState({proto:{...this.state.proto,[f]:e.target.value}});}\n  toggleSauber(){this.setState({proto:{...this.state.proto,sauber:!this.state.proto.sauber}});}\n  toggleKaution(){this.setState({proto:{...this.state.proto,kaution:!this.state.proto.kaution}});}\n  submitProto(){\n    const b=this.state.bookings.find(x=>x.id===this.state.protocolId);\n    const km=Number(this.state.proto.km);\n    if(!km){this.toast('Bitte km-Stand eingeben','warn');return;}\n    const veh=this.getVehicle(b.vehicleId);\n    if(this.state.protoPhase==='ausgabe'){\n      this.updateBooking(b.id,{kmRaus:km,status:'laufend'});\n      const vehs=this.getVehicles().map(v=>v.id===(b.vehicleId||'v1')?{...v,kmCurrent:km}:v);\n      this.setState({kmCurrent:km,protocolId:null,view:'buchungen',stammdaten:{...this.state.stammdaten,vehicles:vehs}});\n      this.toast('Wagen an '+b.kunde+' übergeben','ok');\n    } else {\n      if(km<b.kmRaus){this.toast('km-Stand kleiner als bei Ausgabe','warn');return;}\n      const ns={kmCurrent:km,protocolId:null,view:'buchungen'};\n      if(this.state.proto.sauber)ns.letzteReinigung=this.TODAY;\n      const vehs=this.getVehicles().map(v=>v.id===(b.vehicleId||'v1')?{...v,kmCurrent:km}:v);\n      ns.stammdaten={...this.state.stammdaten,vehicles:vehs};\n      this.updateBooking(b.id,{kmRein:km,status:'abgeschlossen'});\n      this.setState(ns);\n      this.toast('Rücknahme abgeschlossen','ok');\n    }\n  }\n\n  // ---- rechnungen ----\n  nextInvoiceNr(){\n    const year=new Date().getFullYear();\n    const nums=this.state.bookings.filter(b=>b.rechnung&&b.rechnung.nr.startsWith('R-'+year+'-')).map(b=>+b.rechnung.nr.split('-')[2]);\n    const next=nums.length?Math.max.apply(null,nums)+1:1;\n    return 'R-'+year+'-'+String(next).padStart(3,'0');\n  }\n  createInvoice(id){this.updateBooking(id,{rechnung:{nr:this.nextInvoiceNr(),bezahlt:false,gemahnt:false}});this.toast('Rechnung erstellt','ok');}\n  togglePaid(id){const b=this.state.bookings.find(x=>x.id===id);this.updateBooking(id,{rechnung:{...b.rechnung,bezahlt:!b.rechnung.bezahlt}});}\n  sendMahnung(id){const b=this.state.bookings.find(x=>x.id===id);if(b?.rechnung)this.updateBooking(id,{rechnung:{...b.rechnung,gemahnt:true}});this.toast('Mahnung als gesendet markiert','ok');}\n\n  // ---- print ----\n  printInvoice(id){this.setState({printInvoiceId:id});}\n  closePrint(){this.setState
